<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الامتحان الإلكتروني</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="backend/api.js"></script>
</head>
<body>
    <!-- First-run seed notification (shown once, auto-hides) -->
    <div id="seedBanner" style="display:none;background:#d4edda;color:#155724;border:1px solid #c3e6cb;
         border-radius:8px;padding:14px 20px;margin:0 auto 18px;max-width:480px;
         font-size:15px;text-align:center;line-height:1.6">
      ✅ <strong>تم إعداد قاعدة البيانات تلقائياً</strong><br>
      تم إنشاء الجداول وإضافة بيانات تجريبية. يمكنك تسجيل الدخول الآن.
    </div>

    <div class="brand-header">
      <div class="brand-icon">🎓</div>
      <h1 class="h1">نظام الامتحان الإلكتروني</h1>
      <p class="paragraph">الرجاء اختيار نوع المستخدم ثم إدخال بيانات الدخول</p>
    </div>
    <div class="dropdown-container">
        <select id="userType" class="dropdown-select dropdown-select-visible">
            <option value="طالب">طالب</option>
            <option value="مشرف">مشرف (أدمن)</option>
            <option value="معلم">معلم</option>
        </select>
        <br>
        <input id="userName" type="text" placeholder="أدخل اسمك" required class="name-input">
        <br>
        <input id="userPassword" type="password" placeholder="أدخل كلمة المرور" required class="password-input">
        <br>
        <button type="button" class="login-btn" onclick="login()">تسجيل الدخول</button>
    </div>
    <script>
        // Auto-initialise DB on first visit; disable login until ready
        (async function initDB() {
            const btn = document.querySelector('.login-btn');
            btn.disabled = true;
            btn.textContent = 'جارٍ التهيئة...';
            try {
                const res = await fetch('backend/init.php').then(r => r.json());
                if (res && res.seeded) {
                    const banner = document.getElementById('seedBanner');
                    banner.style.display = 'block';
                    setTimeout(() => { banner.style.opacity = '0'; banner.style.transition = 'opacity 1s'; }, 5000);
                    setTimeout(() => { banner.style.display = 'none'; }, 6100);
                }
            } catch (_) { /* server not reachable — leave button disabled */ }
            btn.disabled = false;
            btn.textContent = 'تسجيل الدخول';
        })();

        async function login() {
            const userType = document.getElementById('userType').value;
            const userName = document.getElementById('userName').value.trim();
            const userPassword = document.getElementById('userPassword').value;
            const btn = document.querySelector('.login-btn');

            if (!userName || !userPassword) {
                alert('الرجاء إدخال الاسم وكلمة المرور');
                return;
            }

            btn.textContent = 'جارٍ التحقق...';
            btn.disabled = true;

            try {
                const res = await API.login(userType, userName, userPassword);
                if (!res.success) {
                    alert(res.message || 'خطأ في تسجيل الدخول');
                    return;
                }

                localStorage.setItem('authToken',    res.data.token);
                localStorage.setItem('currentUser',  JSON.stringify(res.data.user));

                const role = res.data.user.role;
                if (role === 'admin')           { localStorage.setItem('adminLoggedIn', 'true'); window.location.href = 'admin.html'; }
                else if (role === 'teacher')    window.location.href = 'teacher.html';
                else                            window.location.href = 'student2.html';

            } catch (e) {
                alert(e.message);
            } finally {
                btn.textContent = 'تسجيل الدخول';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
