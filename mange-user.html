<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مراقبة الطلاب</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="backend/api.js"></script>
</head>
<body>
  <h1 class="h1">مراقبة الطلاب</h1>
  <p class="paragraph">سجلات جلسات الامتحانات ونتائج الطلاب</p>

  <div class="container">
    <div class="box">
      <h2>سجلات الجلسات (<span id="count">0</span>)</h2>
      <div id="logsList"><p style="color:#aaa;text-align:center;padding:20px">جارٍ التحميل...</p></div>
    </div>

    <div class="center" style="margin-top:30px;display:flex;gap:12px;justify-content:center">
      <button class="btn delete" onclick="clearAll()">مسح جميع السجلات</button>
      <a href="admin.html"><button class="btn back">العودة إلى لوحة التحكم</button></a>
    </div>
  </div>

  <script>
    // Verify admin session on load
    (async function(){
      const res = await API.me().catch(() => null);
      if (!res || !res.success || res.data.role !== 'admin') {
        window.location.href = 'index.html';
      }
    })();

    async function render() {
      const el  = document.getElementById('logsList');
      const res = await API.getLogs().catch(e => ({ success: false, message: e.message }));

      if (!res.success) { el.innerHTML = '<p style="color:#c00;padding:20px">' + res.message + '</p>'; return; }

      const logs = res.data || [];
      document.getElementById('count').textContent = logs.length;

      if (!logs.length) {
        el.innerHTML = '<p style="color:#999;text-align:center;padding:30px">لا توجد سجلات بعد.</p>';
        return;
      }

      el.innerHTML = logs.map(entry => {
        const submitted  = entry.submitted_at
          ? new Date(entry.submitted_at).toLocaleString('ar-IQ')
          : 'لم يُسلَّم';
        const suspicious = parseInt(entry.suspicious_count) || 0;
        const pct        = entry.percentage !== null ? parseFloat(entry.percentage) : null;
        const scoreClass = pct !== null ? (pct >= 50 ? 'status active' : 'status inactive') : '';
        const scoreHtml  = pct !== null
          ? `<span class="${scoreClass}">${entry.score}/${entry.total_marks} (${pct}%)</span>`
          : '<span class="meta">—</span>';

        return `
          <div class="log-entry">
            <div class="log-entry-header">
              <div>
                <strong style="font-size:16px;color:var(--green)">${entry.student_name || '—'}</strong>
                <span class="meta" style="margin-right:10px;font-size:13px">
                  ${entry.student_email || ''} — رقم الجلوس: ${entry.roll_number || '—'}
                </span>
              </div>
              <div style="display:flex;align-items:center;gap:12px">
                <div class="meta" style="font-size:13px">${submitted}</div>
                <button class="btn-small" onclick="deleteEntry(${entry.id})">حذف</button>
              </div>
            </div>
            <div class="log-entry-details">
              <span><strong>المادة:</strong> ${entry.subject || '—'}</span>
              <span><strong>النتيجة:</strong> ${scoreHtml}</span>
              <span>
                <strong>أحداث مشبوهة:</strong>
                <span class="${suspicious > 0 ? 'status inactive' : 'status active'}">${suspicious}</span>
              </span>
              <span><strong>إجمالي السجلات:</strong> ${entry.log_count}</span>
            </div>
          </div>`;
      }).join('');
    }

    async function deleteEntry(id) {
      if (!confirm('هل تريد حذف هذا السجل؟')) return;
      const res = await API.deleteLog(id).catch(e => ({ success: false, message: e.message }));
      if (res.success) render();
      else alert(res.message);
    }

    async function clearAll() {
      if (!confirm('هل تريد مسح جميع سجلات الجلسات؟ لا يمكن التراجع.')) return;
      const res = await API.clearLogs();
      alert(res.message);
      if (res.success) render();
    }

    render();
  </script>
</body>
</html>
